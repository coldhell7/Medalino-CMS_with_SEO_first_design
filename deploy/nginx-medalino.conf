# Medalino storefront — only responds on domain, not bare IP (default_server stays on pipeline).
server {
    listen 80;
    listen [::]:80;
    server_name medalino.ir www.medalino.ir;

    root /var/www/medalino/storefront;
    index index.html;

    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:3002/api/seo/sitemap;
        proxy_http_version 1.1;
        proxy_set_header Host admin.medalino.ir;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /robots.txt {
        proxy_pass http://127.0.0.1:3002/api/seo/robots;
        proxy_http_version 1.1;
        proxy_set_header Host admin.medalino.ir;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location /_astro/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location ~ /\. {
        deny all;
    }
}

# Admin panel (optional subdomain)
server {
    listen 80;
    listen [::]:80;
    server_name admin.medalino.ir;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }
}
